name: "Octi — Triage Handler"

on:
  repository_dispatch:
    types: [triage]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: string
      repo:
        description: "Target repo (owner/name)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: octi-triage-${{ github.event.client_payload.repo || inputs.repo }}-${{ github.event.client_payload.issue_number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Classify Issue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Claude API triage
        id: triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.OCTI_PAT }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number || inputs.issue_number }}
          TARGET_REPO: ${{ github.event.client_payload.repo || inputs.repo }}
        run: |
          chmod +x .github/scripts/claude-triage.sh
          bash .github/scripts/claude-triage.sh "$ISSUE_NUMBER" "$TARGET_REPO"
