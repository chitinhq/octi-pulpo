name: "Octi — Triage"

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: string

permissions:
  issues: write
  contents: read

concurrency:
  group: octi-triage-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Classify Issue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Skip if already triaged
        id: check
        env:
          GH_TOKEN: ${{ secrets.OCTI_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -qE "^tier:(c|b-scope|b-code|a-groom|a)$"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Claude API triage
        if: steps.check.outputs.skip == 'false'
        id: triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.OCTI_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/claude-triage.sh
          bash .github/scripts/claude-triage.sh "${{ github.event.issue.number || inputs.issue_number }}"
