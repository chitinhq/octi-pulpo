# A/B harness gold set for Qdrant semantic vs keyword retrieval (#215).
#
# Each entry:
#   query: natural-language dispatch-style question
#   expected_ids: list of Redis memory IDs that SHOULD appear in top-3
#                 (leave empty to skip MRR scoring for that row; the harness
#                  will still print top-3 samples so you can seed gold IDs).
#
# How to populate:
#   1. Run `go run scripts/qdrant_ab/qdrant_ab.go --dump-sample` to see
#      example memory IDs + contents.
#   2. Pick 30 realistic queries you actually run against memory.Recall
#      (grep `mem.Recall(` in the octi tree; paste the query strings).
#   3. For each query, manually identify the 1–3 entry IDs that are the
#      "right" answer. Paste into expected_ids.
#   4. Re-run the harness without --dump-sample to get MRR@3.
#
# Target: 30 queries. Below is the stub with 30 slots.

